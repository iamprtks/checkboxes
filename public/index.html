<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Checkboxes</title>

    <style>
        :root {
            color-scheme: dark light;
            --bg: #0f172a;
            --surface: #111827;
            --surface-alt: #1f2937;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.18);
            --accent: #38bdf8;
            --accent-soft: rgba(56, 189, 248, 0.18);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            background: radial-gradient(circle at top, rgba(56, 189, 248, 0.14), transparent 35%),
                        linear-gradient(180deg, #020617 0%, #0f172a 100%);
            color: var(--text);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        .page {
            width: min(100%, 980px);
            padding: 28px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .title {
            margin: 0;
            font-size: clamp(1.6rem, 2vw, 2.3rem);
            letter-spacing: -0.04em;
        }

        .description {
            margin: 0;
            color: var(--muted);
            font-size: 0.98rem;
            line-height: 1.6;
            max-width: 560px;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(64px, 1fr));
            gap: 16px;
            padding: 18px;
            border-radius: 20px;
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.12);
        }

        #container input[type='checkbox'] {
            appearance: none;
            width: 58px;
            height: 58px;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.15);
            background: rgba(148, 163, 184, 0.06);
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, background-color 0.18s ease;
            position: relative;
        }

        #container input[type='checkbox']:checked {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.18), rgba(56, 189, 248, 0.08));
        }

        #container input[type='checkbox']:checked::after {
            content: '\2713';
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: var(--accent);
            font-size: 1.4rem;
        }

        #container input[type='checkbox']:hover {
            transform: translateY(-1px);
            border-color: rgba(56, 189, 248, 0.55);
            background: rgba(56, 189, 248, 0.1);
        }

        @media (max-width: 640px) {
            body {
                padding: 18px;
            }

            .page {
                padding: 20px;
            }

            #container {
                gap: 12px;
            }

            #container input[type='checkbox'] {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="header">
            <div>
                <h1 class="title">100 Checkboxes</h1>
            </div>
        </header>

        <div id="container"></div>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById("container");
        const CHECKBOX_COUNT=100;

        socket.on(`server:checkbox:change`, (data) => {
            console.log(`socket server event`, data);
            const { index, checked } = data;
            const input = document.getElementById(`checkbox-${index}`);
            if(input){
                input.checked = checked;
            }
        });

        window.addEventListener('load',async()=>{
            const response = await fetch('/checkboxes', { method: 'GET'});
            const data  = await response.json();
            if(data && data.checkboxes){
                data.checkboxes.forEach((serverValue,index)=>{
                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.id = `checkbox-${index}`;
                    input.checked = serverValue;
                    input.addEventListener('change',(event)=>{
                        const checked = event.target.checked;
                        console.log('Checkbox changed',{ index, checked });
                        socket.emit('client:checkbox:change',{ index, checked})
                    })
                    container.appendChild(input)
                });
            }
        })
    </script>
</body>
</html>
